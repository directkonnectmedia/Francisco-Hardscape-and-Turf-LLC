<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <g stroke="#0f172a" stroke-linejoin="round" stroke-linecap="round">

    <!-- BLADE: rounded spade pointing to bottom-left (cursor hotspot ~3, 29) -->
    <path d="M 14 17.5
             Q 18.2 17.5 18.5 22
             Q 18 26 14 29
             Q 10 31.4 6 30.8
             Q 2 30.2 1.6 27
             Q 1.6 22.6 5 20.6
             Q 9 17.5 14 17.5 Z"
          fill="#9ca3af" stroke-width="1.6"/>

    <!-- Notch / V at top of blade where the ferrule seats -->
    <path d="M 11 18.5 L 14 15.6 L 17 18.5"
          fill="#9ca3af" stroke-width="1.4"/>

    <!-- LOWER FERRULE: gray collar at base of shaft -->
    <rect x="13.6" y="12" width="3.8" height="5" rx="0.5"
          fill="#9ca3af" stroke-width="1.3"
          transform="rotate(45 15.5 14.5)"/>

    <!-- WOODEN SHAFT: tan/beige -->
    <rect x="15.6" y="5.5" width="2.8" height="11" rx="1.1"
          fill="#fde68a" stroke-width="1.4"
          transform="rotate(45 17 11)"/>

    <!-- UPPER FERRULE: small gray collar above shaft -->
    <rect x="22.5" y="3.8" width="3" height="3" rx="0.3"
          fill="#9ca3af" stroke-width="1.2"
          transform="rotate(45 24 5.3)"/>

    <!-- ORANGE TRIANGULAR D-GRIP -->
    <path d="M 24 5
             L 30 1
             L 31.5 3.5
             L 27 7 Z"
          fill="#ea580c" stroke-width="1.5"/>

    <!-- Triangular cut-out in middle of grip -->
    <path d="M 26 5
             L 29 2.5
             L 30 3.5
             L 27.5 6 Z"
          fill="#ffffff" stroke-width="0.7"/>
  </g>
</svg>
