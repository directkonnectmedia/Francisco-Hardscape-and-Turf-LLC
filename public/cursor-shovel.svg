<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="55%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="55%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>

  <g stroke="#0f172a" stroke-linejoin="round" stroke-linecap="round">
    <!-- D-grip at top of handle -->
    <ellipse cx="26" cy="5" rx="3.6" ry="3.2" fill="none" stroke-width="2.2"/>
    <line x1="22.8" y1="5.2" x2="29.2" y2="5.2" stroke-width="1.2"/>

    <!-- Wooden shaft (diagonal from grip down to blade) -->
    <rect x="22.5" y="6.8" width="3.2" height="13" rx="1.4" fill="url(#handle)" stroke-width="1.4" transform="rotate(45 24.1 13.3)"/>

    <!-- Metal ferrule joining handle to blade -->
    <rect x="13.4" y="14.2" width="5.2" height="3.4" rx="0.8" fill="#1e293b" stroke="#020617" stroke-width="0.9" transform="rotate(45 16 15.9)"/>

    <!-- Bold cartoon spade blade. Tip points to bottom-left (cursor hotspot ~3,29). -->
    <path d="M 3 29
             Q 2 24 7 19
             L 14 12
             Q 17 11 19 13
             L 21 16
             Q 22 19 19 22
             L 11 30
             Q 7 32 3 29 Z"
          fill="url(#blade)" stroke-width="1.7"/>

    <!-- Cartoon highlight on the blade -->
    <path d="M 6 25 Q 9 21 13 17" fill="none" stroke="#f8fafc" stroke-width="1.3" opacity="0.9"/>
    <circle cx="14" cy="18" r="0.9" fill="#f8fafc" opacity="0.9"/>
  </g>
</svg>
