<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="55%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="55%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>

  <g stroke="#0f172a" stroke-linejoin="round" stroke-linecap="round">
    <!-- Classic D-grip handle ring with crossbar -->
    <ellipse cx="27" cy="4.5" rx="3.4" ry="2.9" fill="none" stroke-width="2"/>
    <line x1="23.6" y1="4.5" x2="30.4" y2="4.5" stroke-width="1.3"/>

    <!-- Straight wooden shaft (chunky cartoon-style) -->
    <rect x="22.2" y="6.4" width="3.6" height="13" rx="1.6"
          fill="url(#handle)" stroke-width="1.5"
          transform="rotate(45 24 12.9)"/>

    <!-- Metal ferrule joining shaft to blade -->
    <rect x="13" y="14" width="5" height="3.4" rx="0.6"
          fill="#1e293b" stroke="#020617" stroke-width="0.9"
          transform="rotate(45 15.5 15.7)"/>

    <!-- Traditional round-point shovel blade.
         Rounded shoulders at the top, gentle curved sides taper to a single
         digging point at bottom-left (cursor hotspot ~3, 30). -->
    <path d="M 14 17.5
             Q 18.5 17.5 18.5 22
             Q 17.5 26 12 29
             L 9 30.5
             Q 5 32 2.5 29.5
             Q 0.5 26 4 22
             Q 8 17.5 14 17.5 Z"
          fill="url(#blade)" stroke-width="1.6"/>

    <!-- Center spine of the blade -->
    <path d="M 13.5 18.5 L 6 27" stroke="#0f172a" stroke-width="0.7" opacity="0.4"/>

    <!-- Cartoon highlight stroke -->
    <path d="M 5 26 Q 9 22 13 19" fill="none" stroke="#f8fafc" stroke-width="1.2" opacity="0.85"/>
    <circle cx="13.4" cy="19" r="0.85" fill="#f8fafc" opacity="0.9"/>
  </g>
</svg>
